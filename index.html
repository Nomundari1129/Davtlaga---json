<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-pink-50 p-6">
    <div id="users"></div>
    <script>
        fetch("./data.json")
            .then((response) => response.json())
            .then((data) => {
                console.log(data);
                const container = document.getElementById("users");

                data.forEach((user) => {
                    const div = document.createElement("div");
                    div.className = "bg-gradient-to-r from-pink-100 to-purple-100 rounded-2xl p-4 mb-4 border border-white shadow-md";
                    div.innerHTML = `
                    <h3 class="text-lg font-bold text-purple-700">Name:${user.name} Age:${user.age}</h3>
                    <p class="text-pink-700 mt-1">Email:${user.gmail}</p>
                    `;
                    container.appendChild(div);
                });
            })
            .catch((error) => console.error("Error:", error));
    </script>
</body>
</html>
